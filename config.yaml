  - Junior AI Engineer
  - Junior AI
  - AI Engineer
  - Junior Data Scientist
  - Junior Data Analyst

model: llama-3.3-70b-versatile
max_tokens: 4096

# Oferty starsze niż tyle godzin są pomijane (świeżość!)
recency_hours: 24

reports_dir: reports
seen_file: data/seen.json
logs_dir: logs
