# Hidden Job Scout — konfiguracja
# Role do wyszukiwania — dopisz/zmień dowolną, bez zmian w kodzie.
roles:
  - SDET
  - QA engineer
  - tester
  - test engineer
  - test automation engineer
  - test developer
  - test lead
  - test manager
  - AI tester
  - AI test engineer
  - AI SDET

# Sekcja "AI Jobs" — role juniorskie/entry AI. Oferty z "Senior" w tytule odpadają.
# Pusta lista wyłącza sekcję.
